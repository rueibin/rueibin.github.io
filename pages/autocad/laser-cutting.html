                        <p class="c-text-indent c-text-16">那時候要在牆上噴上標語，例如：嚴禁人員乘坐。最快的方法就是在WORD輸入想要的字，列印出來，自已diy鏤空噴字印板，但無法重複使用， </p>
                        <p class="c-text-indent c-text-16">於是，自已使用CAD畫上字，標明尺寸與材質，給廠商雷射切割。 </p>
